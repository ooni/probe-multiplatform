name: 'Setup Apple signing'
description: 'Creates a single-use keychain, imports the signing certificate, and grants codesign access to it. macOS runners only.'

inputs:
  apple_certificate:
    description: 'Base64-encoded .p12 signing certificate'
    required: true
  apple_certificate_password:
    description: 'Password for the .p12 certificate'
    required: true

outputs:
  keychain_path:
    description: 'Absolute path of the created keychain. Pass to `-Pcompose.desktop.mac.signing.keychain`.'
    value: ${{ steps.install.outputs.keychain_path }}

runs:
  using: "composite"
  steps:
    - name: Install Apple signing certificate
      id: install
      shell: bash
      env:
        APPLE_CERTIFICATE: ${{ inputs.apple_certificate }}
        P12_PASSWORD: ${{ inputs.apple_certificate_password }}
      run: |
        set -euo pipefail
        CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
        KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
        KEYCHAIN_PASSWORD=temporary  # single-use keychain, password is not sensitive

        echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERTIFICATE_PATH"

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security list-keychain -d user -s "$KEYCHAIN_PATH"

        echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"
