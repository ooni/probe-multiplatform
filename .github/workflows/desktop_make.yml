name: Desktop package apps
on:
  workflow_dispatch:
    inputs:
      macOS:
        description: 'MacOS'
        required: false
        type: boolean
      windows:
        description: 'Windows'
        required: false
        type: boolean
      linux:
        description: 'Linux'
        required: false
        type: boolean
      macOS_appstore:
        description: 'macOS App Store (PKG)'
        required: false
        type: boolean
      windows_appstore:
        description: 'Windows Store (EXE)'
        required: false
        type: boolean
  push:
    paths:
      - 'buildSrc/**'
      - '.github/workflows/desktop_make.yml'
  pull_request:
    paths:
      - 'buildSrc/**'
      - '.github/workflows/desktop_make.yml'

concurrency:
  group: desktop-packaging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    name: Plan distributions
    runs-on: ubuntu-latest
    outputs:
      macos: ${{ steps.plan.outputs.macos }}
      windows: ${{ steps.plan.outputs.windows }}
      linux: ${{ steps.plan.outputs.linux }}
    steps:
      - id: plan
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          IN_MACOS: ${{ inputs.macOS }}
          IN_MACOS_STORE: ${{ inputs.macOS_appstore }}
          IN_WINDOWS: ${{ inputs.windows }}
          IN_WINDOWS_STORE: ${{ inputs.windows_appstore }}
          IN_LINUX: ${{ inputs.linux }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            mac_direct="$IN_MACOS"
            mac_store="$IN_MACOS_STORE"
            win_direct="$IN_WINDOWS"
            win_store="$IN_WINDOWS_STORE"
            linux="$IN_LINUX"
          else
            # push/pull_request on buildSrc/** — validate direct builds only
            mac_direct="true"
            mac_store="true"
            win_direct="true"
            win_store="true"
            linux="true"
          fi

          mac='[]'
          [ "$mac_direct" = "true" ] && mac=$(jq -cn --argjson a "$mac" '$a + [{"distribution":"direct"}]')
          [ "$mac_store" = "true" ] && mac=$(jq -cn --argjson a "$mac" '$a + [{"distribution":"mac-appstore"}]')
          echo "macos=$mac" >> "$GITHUB_OUTPUT"

          win='[]'
          [ "$win_direct" = "true" ] && win=$(jq -cn --argjson a "$win" '$a + [{"distribution":"direct"}]')
          [ "$win_store" = "true" ] && win=$(jq -cn --argjson a "$win" '$a + [{"distribution":"ms-store"}]')
          echo "windows=$win" >> "$GITHUB_OUTPUT"

          echo "linux=$linux" >> "$GITHUB_OUTPUT"

  package-macos:
    name: Package macOS app (${{ matrix.distribution }})
    needs: plan
    if: ${{ needs.plan.outputs.macos != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.macos) }}
    runs-on: macos-latest
    env:
      ORGANIZATION: ooni
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (repo action)
        uses: ./.github/actions/setup
        with:
          java_version: '23'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('**/gradle.properties','**/*.gradle','**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Apple signing
        id: apple-signing
        uses: ./.github/actions/setup-apple-signing
        with:
          apple_certificate: ${{ secrets.APPLE_CERTIFICATE }}
          apple_certificate_password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Package & notarize DMG (direct)
        if: matrix.distribution == 'direct'
        run: |
          ./gradlew copyBrandingToCommonResources notarizeDmg -Porganization=${{ env.ORGANIZATION }} \
            -Pcompose.desktop.mac.sign=true \
            -Pcompose.desktop.mac.signing.identity="Open Observatory of Network Interference (OONI) ETS" \
            -Pcompose.desktop.mac.signing.keychain=${{ steps.apple-signing.outputs.keychain_path }} \
            -Pcompose.desktop.mac.notarization.appleID=${{ secrets.APPLE_ID }} \
            -Pcompose.desktop.mac.notarization.password=${{ secrets.APPLE_ASP }} \
            -Pcompose.desktop.mac.notarization.teamID=${{ secrets.APPLE_TEAM_ID }}

      - name: Sparkle appcast generation (direct)
        if: matrix.distribution == 'direct'
        run: ./gradlew generateSparkleAppCast -Porganization=${{ env.ORGANIZATION }}

      # packagePkg finalizes with verifyStoreBundle, which audits the produced
      # .pkg for Sparkle/WinSparkle/updatebridge residue and fails the build if found.
      - name: Package PKG for Mac App Store
        if: matrix.distribution == 'mac-appstore'
        run: |
          ./gradlew copyBrandingToCommonResources packagePkg \
            -Porganization=${{ env.ORGANIZATION }} \
            -PdesktopDistribution=mac-appstore \
            -Pcompose.desktop.mac.sign=true \
            -Pcompose.desktop.mac.signing.identity="Open Observatory of Network Interference (OONI) ETS" \
            -Pcompose.desktop.mac.signing.keychain=${{ steps.apple-signing.outputs.keychain_path }} \
            -Pcompose.desktop.mac.notarization.appleID=${{ secrets.APPLE_ID }} \
            -Pcompose.desktop.mac.notarization.password=${{ secrets.APPLE_ASP }} \
            -Pcompose.desktop.mac.notarization.teamID=${{ secrets.APPLE_TEAM_ID }}

      - name: Upload direct artifacts
        if: matrix.distribution == 'direct'
        uses: actions/upload-artifact@v4
        with:
          name: desktopApps-macos-${{ github.run_id }}
          path: |
            composeApp/build/compose/binaries/main/dmg/OONI Probe-*.dmg
            composeApp/build/compose/binaries/main/app/OONI Probe.app
            composeApp/macos-appcast.xml
          retention-days: 7

      - name: Upload Mac App Store artifact
        if: matrix.distribution == 'mac-appstore'
        uses: actions/upload-artifact@v4
        with:
          name: desktopApps-macos-appstore-${{ github.run_id }}
          path: |
            composeApp/build/compose/binaries/main/pkg/OONI Probe-*.pkg
          retention-days: 7

  package-windows:
    name: Package Windows app (${{ matrix.distribution }})
    needs: plan
    if: ${{ needs.plan.outputs.windows != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.windows) }}
    runs-on: windows-latest
    env:
      ORGANIZATION: ooni
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (repo action)
        uses: ./.github/actions/setup
        with:
          java_version: '23'

      - name: Package Exe (direct)
        if: matrix.distribution == 'direct'
        shell: pwsh
        run: .\gradlew.bat copyBrandingToCommonResources packageExe -Porganization=${{ env.ORGANIZATION }}

      # packageExe finalizes with verifyStoreBundle, which audits the produced
      # .exe for Sparkle/WinSparkle/updatebridge residue and fails the build
      # if found.
      - name: Package EXE for Microsoft Store
        if: matrix.distribution == 'ms-store'
        shell: pwsh
        run: .\gradlew.bat copyBrandingToCommonResources packageExe -Porganization=${{ env.ORGANIZATION }} -PdesktopDistribution=ms-store

      - name: Upload direct artifacts
        if: matrix.distribution == 'direct'
        uses: actions/upload-artifact@v4
        with:
          name: desktopApps-windows-${{ github.run_id }}
          path: |
            composeApp/build/compose/binaries/main/exe/OONI Probe-*.exe
          retention-days: 7

      - name: Upload Microsoft Store artifact
        if: matrix.distribution == 'ms-store'
        uses: actions/upload-artifact@v4
        with:
          name: desktopApps-windows-appstore-${{ github.run_id }}
          path: |
            composeApp/build/compose/binaries/main/exe/OONI Probe-*.exe
          retention-days: 7

  package-linux:
    name: Package Linux app
    needs: plan
    if: ${{ needs.plan.outputs.linux == 'true' }}
    runs-on: ubuntu-latest
    env:
      ORGANIZATION: ooni
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (repo action)
        uses: ./.github/actions/setup
        with:
          java_version: '23'

      - name: Package Deb
        run: ./gradlew copyBrandingToCommonResources packageDeb -Porganization=${{ env.ORGANIZATION }}

      - name: Install libfuse2
        run: |
          sudo add-apt-repository universe
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Package AppImage
        run: ./gradlew copyBrandingToCommonResources packageAppImage -Porganization=${{ env.ORGANIZATION }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktopApps-linux-${{ github.run_id }}
          path: |
            composeApp/build/compose/binaries/main/deb/ooni-probe_*_amd64.deb
            composeApp/build/compose/binaries/main/appimage-workspace/OONI-Probe-*-x86_64.AppImage
          retention-days: 7
